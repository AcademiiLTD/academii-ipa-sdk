name: Dotnet Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
          cache: true
          cache-dependency-path: tests/HttpApiClient.Tests/HttpApiClient.Tests.csproj

      - name: Restore test project
        run: dotnet restore tests/HttpApiClient.Tests/HttpApiClient.Tests.csproj

      - name: Run unit tests
        run: dotnet test tests/HttpApiClient.Tests/HttpApiClient.Tests.csproj --no-restore
